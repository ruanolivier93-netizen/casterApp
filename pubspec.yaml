name: video_caster_app
description: "Cast any video to your TV — no ads, no subscriptions"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  flutter_riverpod: ^2.5.1
  youtube_explode_dart: ^2.3.0
  http: ^1.2.0
  xml: ^6.5.0
  uuid: ^4.4.0
  shared_preferences: ^2.2.3
  cached_network_image: ^3.3.1
  wakelock_plus: ^1.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
