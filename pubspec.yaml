name: video_caster_app
description: "Cast any video to your TV — no ads, no subscriptions"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  flutter_riverpod: ^2.5.1
  youtube_explode_dart: ^2.3.0
  http: ^1.2.0
  xml: ^6.5.0
  shared_preferences: ^2.2.3
  cached_network_image: ^3.3.1
  wakelock_plus: ^1.2.1
  webview_flutter: ^4.10.0
  webview_flutter_android: ^4.0.0
  webview_flutter_wkwebview: ^3.20.0
  multicast_dns: ^0.3.2+6
  file_picker: ^8.0.0
  path_provider: ^2.1.0
  dio: ^5.4.0
  permission_handler: ^11.3.0
  receive_sharing_intent: ^1.8.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  webview_flutter_platform_interface: ^2.10.0
  image: ^4.0.0
  flutter_launcher_icons: ^0.14.3

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/app_icon.png"
  adaptive_icon_background: "#4B5AE6"
  adaptive_icon_foreground: "assets/app_icon_foreground.png"
  min_sdk_android: 21

flutter:
  uses-material-design: true
